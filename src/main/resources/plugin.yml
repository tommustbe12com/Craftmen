name: Craftmen
version: 1.0
main: com.tommustbe12.craftmen.Craftmen
api-version: 1.21
commands:
  help:
    description: Craftmen help menu
    usage: /help [bukkit]
  setuparena:
    description: Create a new arena
    usage: /setuparena <name>
    permission: craftmen.admin
  checkstatus:
    description: Debug only! Checks your player state
    usage: /checkstatus
  hub:
    description: Go to the server hub
    usage: /hub
    aliases: spawn
  duel:
    description: Duel a player in Craftmen
    usage: /duel <name>
  accept:
    description: Accept a duel request
    usage: /accept <name>
  leavequeue:
    aliases: lq
    description: Leave the queue
    usage: /leavequeue
  stat:
    description: Change the stats of a player
    usage: /stat <player> <wins|losses|deaths> <add|sub|reset> [amount]
    permission: craftmen.admin
  forfeit:
    aliases: f
    description: Forfeit the match you are in
    usage: /forfeit
  queue:
    aliases: q
    description: Open the queue menu
    usage: /queue
  spectate:
    aliases:
      - spec
      - s
    description: Spectate a player
    usage: /spectate <player>
  endfight:
    aliases:
      - ef
      - end
    description: Join the current End Fight, or start a new one!
    usage: /endfight
  kit:
    aliases:
      - kitedit
      - kiteditor
    description: Open the kit editor
    usage: /kit [game]
  trims:
    aliases:
      - trim
      - armortrims
    description: Customize armor trims (hub only)
    usage: /trims
  ffa:
    description: Open FFA menu (or leave if already in FFA)
    usage: /ffa
  badges:
    description: Open the badge selector
    usage: /badges
  badgeadmin:
    description: Admin badge editor
    usage: /badgeadmin
    permission: craftmen.admin
  party:
    aliases:
      - p
    description: Party commands + private FFA
    usage: /party
  pc:
    description: Party chat
    usage: /pc [message]
  gems:
    description: View or manage gems
    usage: /gems [player] | /gems add|sub|set <player> <amount>
  shop:
    description: Open cosmetics shop
    usage: /shop
  stats:
    aliases: s
    description: Show player statistics
    usage: /stats
permissions:
  craftmen.admin:
    default: op
